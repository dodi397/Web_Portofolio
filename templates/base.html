<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Portofolio Flask{% endblock %}</title>
    <meta name="description" content="Web portofolio dinamis dengan Flask, SQLite, dan dashboard admin." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/00-variables.css') }}" rel="stylesheet" />
    <link href="{{ url_for('static', filename='css/01-base.css') }}" rel="stylesheet" />
    <link href="{{ url_for('static', filename='css/02-components.css') }}" rel="stylesheet" />
    <link href="{{ url_for('static', filename='css/03-pages.css') }}" rel="stylesheet" />
    <link href="{{ url_for('static', filename='css/04-dashboard.css') }}" rel="stylesheet" />
    <link href="{{ url_for('static', filename='css/05-responsive.css') }}" rel="stylesheet" />
    {% block head %}{% endblock %}
</head>
<body class="{% if dashboard_view %}dashboard-mode{% else %}public-mode{% endif %}">
    <canvas id="bgCanvas" aria-hidden="true"></canvas>
    <div class="bg-orb bg-orb-a"></div>
    <div class="bg-orb bg-orb-b"></div>

    {% if dashboard_view %}
        {% include 'partials/dashboard_topbar.html' %}
    {% else %}
        {% include 'partials/public_nav.html' %}
    {% endif %}

    <main class="{% if dashboard_view %}dashboard-page{% else %}site-page{% endif %}">
        <div class="container-fluid px-3 px-lg-4">
            {% include 'partials/flash_messages.html' %}
        </div>

        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
